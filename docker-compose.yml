name: 'ticket_service'

services:
  
  domic.ticket.service:
    networks:
      - domic
    image: domic_ticket_service_image:1.0.0
    container_name: "domic_ticket_service"
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "3010-3020:443"
    volumes:
      - ~/services/Logs/Domic-TicketService/:/app/CoreLogs/
      - ~/services/Domic-TicketService/.https/:/https/
    environment:
      - Elastic-Host=http://domic.elastic.search:9200
      - Elastic-Index=ticket
      - Elastic-Username=domic
      - Elastic-Password=Domic123!@#
      - E-RabbitMQ-Host=domic.rabbit.mq
      - E-RabbitMQ-Port=5672
      - E-RabbitMQ-Username=domic
      - E-RabbitMQ-Password=Domic123!@#
      - I-RabbitMQ-Host=
      - I-RabbitMQ-Port=
      - I-RabbitMQ-Username=
      - I-RabbitMQ-Password=
      - E-RedisConnectionString=domic.redis:6379
      - I-RedisConnectionString=domic.redis:6379
#     - I-RedisConnectionString=domic.ticket.redis:6379
      - MongoConnectionString=
#     - C-SqlServerConnectionString=Server=domic.ticket.command.sql.server,1433;Database=TicketService;User ID=sa;Password=Domic123!@#;Persist Security Info=True;MultipleActiveResultSets=True;TrustServerCertificate=True;
      - C-SqlServerConnectionString=Server=domic.sql.server,1433;Database=TicketService;User ID=sa;Password=Domic123!@#;Persist Security Info=True;MultipleActiveResultSets=True;TrustServerCertificate=True;
      - Q-SqlServerConnectionString=
      - Host=domic.ticket.service
      - Port=443
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_Kestrel__Certificates__Default__Password=Domic123!@#
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/Domic.WebAPI.pfx
    
